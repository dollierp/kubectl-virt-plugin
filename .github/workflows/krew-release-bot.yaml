name: krew-release-bot
on:
  release:
    types: [published]
  workflow_dispatch: {}
jobs:
  run-krew-release-bot:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Update new version in krew-index
      uses: rajatjindal/krew-release-bot@v0.0.50
      with:
        krew_template_file: /dev/null
